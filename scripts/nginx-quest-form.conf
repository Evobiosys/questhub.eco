# nginx-quest-form.conf
# =====================================================================
# Add this location block to the evobiosys.org server block in nginx.
# The FastAPI backend must be running on port 8787 (see quest-form.service).
#
# Full path: /etc/nginx/sites-available/evobiosys.org
# After adding: nginx -t && systemctl reload nginx
# =====================================================================

location /quest-submit {
    # Allow POST only — GET/DELETE/etc. get 405
    limit_except POST {
        deny all;
    }

    # Proxy to local FastAPI (uvicorn)
    proxy_pass         http://127.0.0.1:8787;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_read_timeout 15s;
}

location /health/quest-form {
    proxy_pass http://127.0.0.1:8787/health;
}

# =====================================================================
# quest-form.service — systemd unit for the FastAPI backend
# Place at: /etc/systemd/system/quest-form.service
# Enable:   systemctl enable --now quest-form
# =====================================================================
#
# [Unit]
# Description=QuestHub form submission backend
# After=network.target
#
# [Service]
# Type=simple
# User=www-data
# WorkingDirectory=/srv/questhub.eco/scripts
# ExecStart=/usr/local/bin/uvicorn quest-form-backend:app --host 127.0.0.1 --port 8787
# Restart=on-failure
# RestartSec=5
# Environment=SUBMISSIONS_FILE=/var/local/questhub/submissions.jsonl
# Environment=REDIRECT_SUCCESS=https://questhub.eco/?submitted=true
#
# [Install]
# WantedBy=multi-user.target
