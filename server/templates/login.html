<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — QuestHub</title>
  <link rel="stylesheet" href="/assets/css/style.css">
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
</head>
<body class="qh-login-body">
<div class="qh-login-page">

  <nav class="qh-nav">
    <a href="/" class="qh-nav-logo">Quest<span>Hub</span></a>
  </nav>

  <main class="qh-login-main">
    <div class="qh-login-card">

      <div class="qh-login-emblem" aria-hidden="true">&#9675;</div>
      <h1 class="qh-login-title">Welcome to the <span class="accent">Garden</span></h1>
      <p class="qh-login-sub">Sign in or create your account — no password needed.</p>

      <!-- Error from OIDC redirect -->
      <div id="oidc-error" class="qh-login-msg qh-login-msg--err" style="display:none"></div>

      <!-- Magic link form -->
      <form id="magic-form" class="qh-login-form" autocomplete="off">
        <!-- Honeypot -->
        <div style="position:absolute;left:-9999px" aria-hidden="true">
          <input type="text" name="website" tabindex="-1" autocomplete="off">
        </div>
        <label for="login-email">Email address</label>
        <input type="email" id="login-email" name="email" required
          placeholder="you@example.com" autocomplete="email">
        <button type="submit" class="qh-btn qh-btn--full" id="login-btn">Send magic link</button>
      </form>

      <p id="login-msg" class="qh-login-msg" style="display:none"></p>

      <!-- OAuth divider -->
      <div class="qh-login-divider"><span>or sign in with</span></div>

      <!-- Primary OAuth: Infomaniak + GitLab -->
      <div class="qh-oauth-row">
        <a href="/auth/oidc/infomaniak/start" class="qh-oauth-btn qh-oauth-infomaniak">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M8 12h8M12 8v8"/></svg>
          Infomaniak
        </a>
        <a href="/auth/oidc/gitlab/start" class="qh-oauth-btn qh-oauth-gitlab">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M22.65 14.39L12 22.13 1.35 14.39a.84.84 0 0 1-.3-.94l1.22-3.78 2.44-7.51A.42.42 0 0 1 4.82 2a.43.43 0 0 1 .58 0 .42.42 0 0 1 .11.18l2.44 7.49h8.1l2.44-7.51A.42.42 0 0 1 18.6 2a.43.43 0 0 1 .58 0 .42.42 0 0 1 .11.18l2.44 7.51L23 13.45a.84.84 0 0 1-.35.94z"/>
          </svg>
          GitLab
        </a>
      </div>

      <!-- Other options (collapsed by default) -->
      <details class="qh-oauth-other">
        <summary>Other options</summary>
        <div class="qh-oauth-other-list">
          <a href="/auth/oidc/github/start" class="qh-oauth-btn qh-oauth-github">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.3 3.44 9.8 8.21 11.39.6.11.82-.26.82-.58v-2.03c-3.34.73-4.04-1.61-4.04-1.61-.54-1.38-1.33-1.75-1.33-1.75-1.09-.74.08-.73.08-.73 1.2.09 1.84 1.24 1.84 1.24 1.07 1.83 2.81 1.3 3.5.99.11-.78.42-1.3.76-1.6-2.67-.3-5.47-1.34-5.47-5.95 0-1.31.47-2.39 1.24-3.23-.12-.3-.54-1.52.12-3.18 0 0 1.01-.32 3.3 1.23A11.5 11.5 0 0 1 12 5.8c1.02.005 2.05.14 3.01.4 2.29-1.55 3.3-1.23 3.3-1.23.66 1.66.24 2.88.12 3.18.77.84 1.24 1.92 1.24 3.23 0 4.62-2.81 5.64-5.49 5.94.43.37.81 1.1.81 2.22v3.29c0 .32.22.7.83.58C20.56 21.8 24 17.3 24 12c0-6.63-5.37-12-12-12z"/></svg>
            GitHub
          </a>
          <span class="qh-oauth-coming">Mastodon — coming</span>
        </div>
      </details>

      <p class="qh-login-privacy">
        No password stored. No tracking. <a href="/privacy/">Privacy policy</a>.
      </p>

    </div>
  </main>
</div>

<script>
// Show OIDC error from URL param
const params = new URLSearchParams(location.search);
const oidcErr = params.get('error');
if (oidcErr) {
  const el = document.getElementById('oidc-error');
  el.textContent = decodeURIComponent(oidcErr);
  el.style.display = 'block';
}

document.getElementById('magic-form').addEventListener('submit', async function(e) {
  e.preventDefault();
  const btn = document.getElementById('login-btn');
  const msg = document.getElementById('login-msg');
  btn.disabled = true;
  btn.textContent = 'Sending…';
  msg.style.display = 'none';

  const data = new FormData(this);
  try {
    const r = await fetch('/auth/send-magic-link', {
      method: 'POST',
      body: new URLSearchParams(data),
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
    });
    const json = await r.json();
    msg.style.display = 'block';
    if (json.ok) {
      msg.className = 'qh-login-msg qh-login-msg--ok';
      msg.textContent = json.message || 'Check your inbox for the sign-in link.';
      btn.textContent = 'Link sent ✓';
    } else {
      msg.className = 'qh-login-msg qh-login-msg--err';
      msg.textContent = json.error || 'Something went wrong. Please try again.';
      btn.disabled = false;
      btn.textContent = 'Send magic link';
    }
  } catch (_) {
    msg.style.display = 'block';
    msg.className = 'qh-login-msg qh-login-msg--err';
    msg.textContent = 'Network error. Please try again.';
    btn.disabled = false;
    btn.textContent = 'Send magic link';
  }
});
</script>
</body>
</html>
